name: Multi-Target CI/CD Pipeline

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # 1. CI: Build & Test (Runs on all branches)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      run: npm test

    - name: Verify & Build
      run: npm run build

    # Upload the 'dist' folder so deployment jobs can use it
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-files
        path: dist/
        retention-days: 1

  # ==========================================
  # 2. CD: Deploy to Firebase Hosting (Only on main)
  # ==========================================
  deploy-firebase:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: dist-files
        path: dist/

    - name: Deploy to Firebase
      # Note: You must add FIREBASE_TOKEN to your GitHub repository secrets
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: |
        if [ -z "$FIREBASE_TOKEN" ]; then
          echo "⚠️ FIREBASE_TOKEN secret is missing. Skipping Firebase deployment."
          exit 0
        fi
        npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN"

